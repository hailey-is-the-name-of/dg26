<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>더 나은 대구로 향하는 dg26</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Pretendard", sans-serif;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(7, 16, 30, 0.10), rgba(7, 16, 30, 0.60)),
        url("back.png") center / cover no-repeat;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 로고 + 패널을 하나로 묶는 래퍼 */
    .panel-wrap {
      position: relative;
      width: 100%;
      max-width: 720px;
    }

    /* 로고를 패널 위쪽 중앙에 걸치게 */
    .logo-wrap {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -42%);
      z-index: 3;
      display: flex;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }

    .logo-image {
      display: block;
      width: clamp(170px, 34vw, 250px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.22));
    }

    .panel {
      width: 100%;
      padding: 100px 20px 26px;
      border-radius: 26px;
      background: rgba(10, 20, 35, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    .eyebrow,
    .headline,
    .subcopy,
    .now-text {
      text-align: center;
    }

    .eyebrow {
      font-size: 1rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .headline {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.45;
      margin: 0 0 12px;
      word-break: keep-all;
    }

    .subcopy {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.92);
      margin-bottom: 18px;
      line-height: 1.65;
    }

    .hours-left {
      color: #ffd86e;
      font-weight: 800;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-card {
      background: rgba(255, 255, 255, 0.10);
      padding: 10px 6px;
      border-radius: 14px;
      text-align: center;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .time-value {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .time-label {
      font-size: 0.7rem;
      opacity: 0.72;
      margin-top: 4px;
    }

    .now-text {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .menu-card {
      display: block;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.10);
      text-decoration: none;
      color: #fff;
      transition: 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .menu-card:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .menu-title {
      font-weight: 800;
      font-size: 1rem;
    }

    .menu-desc {
      font-size: 0.85rem;
      opacity: 0.72;
      margin-top: 4px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .page {
        padding: 14px;
      }

      .panel-wrap {
        max-width: 100%;
      }

      .logo-wrap {
        transform: translate(-50%, -38%);
      }

      .logo-image {
        width: clamp(150px, 46vw, 210px);
      }

      .panel {
        padding: 82px 16px 18px;
        border-radius: 22px;
      }

      .headline {
        font-size: 1.28rem;
      }

      .subcopy {
        font-size: 0.94rem;
      }

      .countdown-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .time-card {
        padding: 10px 6px;
      }

      .time-value {
        font-size: 1.12rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel-wrap">
      <div class="logo-wrap">
        <img src="dg26.png" class="logo-image" alt="대구이륙 로고" />
      </div>

      <div class="panel">
        <div class="eyebrow">안내 말씀드립니다.</div>

        <div class="headline">
          더 나은 대구로 향하는 dg26편<br />
          곧 출발 예정입니다.
        </div>

        <div class="subcopy">
          탑승은 약 <span id="hoursLeft" class="hours-left">0시간</span> 후 마감됩니다.
        </div>

        <div class="countdown-grid">
          <div class="time-card">
            <div id="days" class="time-value">0</div>
            <div class="time-label">일</div>
          </div>
          <div class="time-card">
            <div id="hours" class="time-value">0</div>
            <div class="time-label">시간</div>
          </div>
          <div class="time-card">
            <div id="minutes" class="time-value">0</div>
            <div class="time-label">분</div>
          </div>
          <div class="time-card">
            <div id="seconds" class="time-value">0</div>
            <div class="time-label">초</div>
          </div>
        </div>

        <div id="nowText" class="now-text"></div>

        <a href="https://dg26.kr/population" class="menu-card">
          <div class="menu-title">대구 인구 구조 분석</div>
          <div class="menu-desc">연령대·성별 인구 구조 분석 페이지</div>
        </a>
      </div>
    </div>
  </div>

  <script>
    const targetTime = Date.UTC(2026, 5, 2, 15, 0, 0);

    function update() {
      const now = new Date();
      const diff = targetTime - now.getTime();

      if (diff <= 0) {
        document.getElementById("hoursLeft").textContent = "0시간";
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "0";
        document.getElementById("minutes").textContent = "0";
        document.getElementById("seconds").textContent = "0";
        document.getElementById("nowText").textContent = "현재 시각: 마감 시각 이후";
        return;
      }

      const totalHours = Math.floor(diff / (1000 * 60 * 60));
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("hoursLeft").textContent = totalHours.toLocaleString("ko-KR") + "시간";
      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
      document.getElementById("nowText").textContent =
        "현재 시각: " + new Date().toLocaleString("ko-KR");
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
