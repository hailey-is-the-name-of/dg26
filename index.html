<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>dg26 메인페이지</title>

  <!-- Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(7,16,30,0.1), rgba(7,16,30,0.6)),
        url("back.png") center/cover no-repeat;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .panel {
      width: 100%;
      max-width: 720px;
      padding: 26px 20px;
      border-radius: 26px;
      background: rgba(10,20,35,0.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* ✅ 로고 중앙 */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .logo-image {
      width: clamp(160px, 40vw, 240px);
    }

    /* ✅ 텍스트 중앙 */
    .eyebrow,
    .headline,
    .subcopy {
      text-align: center;
    }

    .eyebrow {
      font-size: 1rem;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .headline {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .subcopy {
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 18px;
    }

    .hours-left {
      color: #ffd86e;
      font-weight: 800;
    }

    /* ✅ 카운트다운 (작게) */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-card {
      background: rgba(255,255,255,0.1);
      padding: 10px 6px;
      border-radius: 14px;
      text-align: center;
      font-size: 0.85rem;
    }

    .time-value {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .time-label {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .now-text {
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    /* ✅ 메뉴 */
    .menu-card {
      display: block;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      text-decoration: none;
      color: #fff;
      transition: 0.2s;
    }

    .menu-card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .menu-title {
      font-weight: 800;
      font-size: 1rem;
    }

    .menu-desc {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    /* 모바일 */
    @media (max-width: 480px) {
      .headline {
        font-size: 1.3rem;
      }

      .countdown-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
      <div class="logo-wrap">
        <img src="dg26.png" class="logo-image">
      </div>
  <div class="page">
    <div class="panel">

      <!-- 로고 -->


      <!-- 문구 -->
      <div class="eyebrow">안내 말씀드립니다.</div>

      <div class="headline">
        더 나은 대구로 향하는 dg26편<br>
        곧 출발 예정입니다.
      </div>

      <div class="subcopy">
        탑승은 약 <span id="hoursLeft" class="hours-left">0시간</span> 후 마감됩니다.
      </div>

      <!-- 카운트다운 -->
      <div class="countdown-grid">
        <div class="time-card"><div id="days" class="time-value">0</div><div class="time-label">일</div></div>
        <div class="time-card"><div id="hours" class="time-value">0</div><div class="time-label">시간</div></div>
        <div class="time-card"><div id="minutes" class="time-value">0</div><div class="time-label">분</div></div>
        <div class="time-card"><div id="seconds" class="time-value">0</div><div class="time-label">초</div></div>
      </div>

      <div id="nowText" class="now-text"></div>

      <!-- 메뉴 -->
      <a href="https://dg26.kr/population" class="menu-card">
        <div class="menu-title">대구 인구 구조 분석</div>
        <div class="menu-desc">연령대·성별 인구 구조 분석 페이지</div>
      </a>

    </div>
  </div>

  <script>
    const targetTime = Date.UTC(2026, 5, 2, 15, 0, 0);

    function update() {
      const now = new Date();
      const diff = targetTime - now;

      if (diff <= 0) return;

      const totalHours = Math.floor(diff / (1000 * 60 * 60));
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("hoursLeft").textContent = totalHours + "시간";
      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;

      document.getElementById("nowText").textContent =
        "현재 시각: " + new Date().toLocaleString("ko-KR");
    }

    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
