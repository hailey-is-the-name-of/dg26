<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>dg26 안내 페이지</title>

  <!-- Pretendard Dynamic Subset -->
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"
  />

  <style>
    :root {
      --text-main: rgba(255, 255, 255, 0.98);
      --text-sub: rgba(255, 255, 255, 0.9);
      --text-dim: rgba(255, 255, 255, 0.72);
      --line-soft: rgba(255, 255, 255, 0.14);
      --panel-bg: rgba(7, 16, 30, 0.34);
      --panel-bg-mobile: rgba(7, 16, 30, 0.48);
      --accent: #ffd86e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.30);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family:
        "Pretendard",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        sans-serif;
      color: var(--text-main);
      background: #000;
    }

    body {
      position: relative;
      min-height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(
          180deg,
          rgba(7, 16, 30, 0.10) 0%,
          rgba(7, 16, 30, 0.26) 34%,
          rgba(7, 16, 30, 0.58) 100%
        ),
        url("back.png") center center / cover no-repeat;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 211, 128, 0.22), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.18));
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(20px, env(safe-area-inset-top))
        24px
        max(24px, env(safe-area-inset-bottom))
        24px;
    }

    .panel {
      width: min(920px, 100%);
      padding: 36px 36px 30px;
      border-radius: var(--radius-xl);
      background: var(--panel-bg);
      border: 1px solid var(--line-soft);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      min-width: 110px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .eyebrow {
      font-size: clamp(1rem, 1.8vw, 1.18rem);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
    }

    .headline {
      font-size: clamp(1.55rem, 3.25vw, 2.55rem);
      font-weight: 800;
      line-height: 1.34;
      letter-spacing: -0.02em;
      margin: 0 0 12px 0;
      word-break: keep-all;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.28);
      max-width: 16.5em;
    }

    .subcopy {
      margin: 0;
      font-size: clamp(1rem, 1.4vw, 1.12rem);
      line-height: 1.78;
      color: var(--text-sub);
      max-width: 52em;
      word-break: keep-all;
    }

    .hours-left {
      color: var(--accent);
      font-weight: 800;
    }

    .countdown-wrap {
      margin-top: 28px;
    }

    .countdown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .countdown-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .target-date {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .time-card {
      min-width: 0;
      padding: 20px 14px 18px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      text-align: center;
    }

    .time-value {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    .time-label {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .bottom-meta {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .now-text,
    .footnote {
      font-size: 0.92rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.72);
    }

    @media (max-width: 920px) {
      .page {
        align-items: flex-end;
      }

      .panel {
        width: 100%;
        max-width: 720px;
      }
    }

    @media (max-width: 640px) {
      body {
        background-position: center center;
      }

      .page {
        padding:
          max(12px, env(safe-area-inset-top))
          12px
          max(14px, env(safe-area-inset-bottom))
          12px;
        align-items: flex-end;
      }

      .panel {
        padding: 22px 16px 18px;
        border-radius: 22px;
        background: var(--panel-bg-mobile);
      }

      .logo-badge {
        padding: 10px 15px;
        font-size: 0.83rem;
        min-width: 96px;
        margin-bottom: 16px;
      }

      .eyebrow {
        font-size: 0.98rem;
        margin-bottom: 8px;
      }

      .headline {
        font-size: 1.4rem;
        line-height: 1.42;
        margin-bottom: 10px;
        max-width: 100%;
      }

      .subcopy {
        font-size: 0.96rem;
        line-height: 1.72;
      }

      .countdown-wrap {
        margin-top: 20px;
      }

      .countdown-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
      }

      .countdown-title {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
      }

      .target-date {
        font-size: 0.82rem;
      }

      .countdown-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .time-card {
        padding: 16px 10px 14px;
        border-radius: 18px;
      }

      .time-value {
        font-size: 1.9rem;
        margin-bottom: 8px;
      }

      .time-label {
        font-size: 0.84rem;
      }

      .bottom-meta {
        margin-top: 12px;
        gap: 4px;
      }

      .now-text,
      .footnote {
        font-size: 0.8rem;
        line-height: 1.5;
      }
    }

    @media (max-width: 380px) {
      .panel {
        padding: 18px 13px 16px;
      }

      .headline {
        font-size: 1.28rem;
      }

      .subcopy {
        font-size: 0.92rem;
      }

      .time-value {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="logo-badge">로고</div>

      <div class="eyebrow">안내 말씀드립니다.</div>

      <h1 class="headline">
        더 나은 대구로 향하는 dg26편, 곧 출발 예정입니다.
      </h1>

      <p class="subcopy">
        탑승은 약 <span class="hours-left" id="hoursLeft">0시간</span> 후
        마감되오니 서둘러 주시기 바랍니다.
      </p>

      <div class="countdown-wrap">
        <div class="countdown-header">
          <div class="countdown-title">COUNTDOWN</div>
          <div class="target-date">2026.06.03 00:00 KST</div>
        </div>

        <div class="countdown-grid">
          <div class="time-card">
            <div class="time-value" id="days">0</div>
            <div class="time-label">일</div>
          </div>

          <div class="time-card">
            <div class="time-value" id="hours">0</div>
            <div class="time-label">시간</div>
          </div>

          <div class="time-card">
            <div class="time-value" id="minutes">0</div>
            <div class="time-label">분</div>
          </div>

          <div class="time-card">
            <div class="time-value" id="seconds">0</div>
            <div class="time-label">초</div>
          </div>
        </div>

        <div class="bottom-meta">
          <div class="now-text" id="nowText"></div>
          <div class="footnote">※ 기준 시각은 한국 표준시(KST)입니다.</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // 목표 시각: 2026-06-03 00:00:00 KST
    // UTC 기준으로는 2026-06-02 15:00:00
    const targetTime = Date.UTC(2026, 5, 2, 15, 0, 0);

    const hoursLeftEl = document.getElementById("hoursLeft");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const nowTextEl = document.getElementById("nowText");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatKST(date) {
      const kst = new Date(date.getTime() + 9 * 60 * 60 * 1000);

      const year = kst.getUTCFullYear();
      const month = pad(kst.getUTCMonth() + 1);
      const day = pad(kst.getUTCDate());
      const hours = pad(kst.getUTCHours());
      const minutes = pad(kst.getUTCMinutes());
      const seconds = pad(kst.getUTCSeconds());

      return `${year}.${month}.${day} ${hours}:${minutes}:${seconds}`;
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetTime - now.getTime();

      if (diff <= 0) {
        hoursLeftEl.textContent = "0시간";
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        secondsEl.textContent = "0";
        nowTextEl.textContent = "현재 시각: 2026.06.03 00:00:00 이후";
        return;
      }

      const totalHours = Math.floor(diff / (1000 * 60 * 60));

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      hoursLeftEl.textContent = `${totalHours.toLocaleString("ko-KR")}시간`;
      daysEl.textContent = days.toLocaleString("ko-KR");
      hoursEl.textContent = String(hours);
      minutesEl.textContent = String(minutes);
      secondsEl.textContent = String(seconds);

      nowTextEl.textContent = `현재 시각: ${formatKST(now)}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
